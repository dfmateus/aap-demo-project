[defaults]
# Define paths where Ansible should look for installed collections (via requirements.yml).
# This is necessary for the runner to resolve the Fully Qualified Collection Name (FQCN)
# for roles like 'infra.support_assist.ocp_must_gather'.
collections_paths = /home/runner/.ansible/collections:/usr/share/ansible/collections

# We explicitly disable standard roles_path to prevent path conflicts (optional, but robust)
roles_path = /dev/null