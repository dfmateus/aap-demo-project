[defaults]
# Disabling the default role search path to avoid conflicting with FQCN lookups
# in the current project directory.
roles_path = /dev/null
# Defining paths where Ansible should look for installed collections (via requirements.yml).
# This is necessary for the runner to resolve the Fully Qualified Collection Name (FQCN)
# for roles like 'infra.support_assist.ocp_must_gather'.
collections_paths = /home/runner/.ansible/collections:/usr/share/ansible/collections