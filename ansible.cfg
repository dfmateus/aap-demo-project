[defaults]
# --- CORE SETTINGS ---

# Define roles search paths. Setting to ./roles ensures found the roles within this repo
# roles_path = ./roles

# Define paths where Ansible should look for installed collections.
# This is typically set by the Execution Environment (EE).
# collections_paths = /home/runner/.ansible/collections:/usr/share/ansible/collections

# Ansible will attempt to discover a suitable Python interpreter on each target host
interpreter_python=auto

# --- CALLBACK AND OUTPUT FORMATTING (Modern Approach) ---

# Use the native 'default' callback to handle stdout, resolving the deprecation warning.
stdout_callback = default
bin_ansible_callbacks = True

# Define the output format for the 'default' callback. This is the modern, non-deprecated syntax for YAML output.
callback_result_format = yaml

# Activate the performance and logging plugins using FQCN as requested.
callback_whitelist = ansible.builtin.timer, ansible.builtin.profile_tasks, ansible.builtin.profile_roles

# --- SSH & PERFORMANCE OPTIMIZATION ---

# This is the default SSH timeout to use on connection attempts
timeout = 60

# Set this to "False" if you want to avoid host key checking by the underlying tools
host_key_checking = False

[ssh_connection]
# Reduces the number of network operations required to execute a module on the remote server
pipelining = True 

# The -tt argument is passed to ssh when pipelining is not enabled because sudo requires a tty by default.
usetty = False

# Occasionally users may be managing a remote system that doesn’t have SFTP enabled.
scp_if_ssh = True

# Adds the option to retry failed ssh executions
retries = 3

# SSH Connection Optimization
ssh_args = -C -o ControlMaster=auto -o ControlPersist=60s -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no -o ConnectTimeout=5